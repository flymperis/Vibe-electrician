<div class="table-actions">
    <a href="{{ edit_url }}{% if query_string %}?{{ query_string }}{% endif %}" class="btn btn-secondary btn-icon" title="Επεξεργασία" aria-label="Επεξεργασία">
        <svg class="btn-icon__svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
        </svg>
    </a>
    <form method="post" action="{{ delete_url }}{% if query_string %}?{{ query_string }}{% endif %}" class="inline-form table-actions__delete">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-icon" title="Διαγραφή" aria-label="Διαγραφή" onclick="return confirm('Να διαγραφεί {{ delete_item_label }} ({{ delete_amount|floatformat:2 }} €);')">
            <svg class="btn-icon__svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
        </button>
    </form>
</div>
