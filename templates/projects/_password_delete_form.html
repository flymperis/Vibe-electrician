<form
    method="post"
    action="{{ delete_url }}"
    class="inline-form password-delete-form"
>
    {% csrf_token %}
    <input type="hidden" name="confirm_password" value="">
    {% if next_url %}
    <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    <button
        type="button"
        class="{{ button_class|default:'btn btn-danger btn-icon' }}"
        data-password-delete-trigger
        data-delete-title="{{ delete_title }}"
        data-delete-message="{{ delete_message }}"
        title="{{ button_label|default:'Διαγραφή' }}"
        aria-label="{{ button_label|default:'Διαγραφή' }}"
    >
        <svg class="btn-icon__svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
    </button>
</form>
