<ol class="workflow-steps" aria-label="Διαδικασία προσφοράς">
    <li class="{% if step > 1 %}done{% endif %}{% if step == 1 %}current{% endif %}">
        <span class="workflow-step-num">1</span>
        <span class="workflow-step-label">Προσφορά</span>
    </li>
    <li class="{% if step > 2 %}done{% endif %}{% if step == 2 %}current{% endif %}">
        <span class="workflow-step-num">2</span>
        <span class="workflow-step-label">Αποστολή</span>
    </li>
    <li class="{% if step > 3 %}done{% endif %}{% if step == 3 %}current{% endif %}">
        <span class="workflow-step-num">3</span>
        <span class="workflow-step-label">Δημιουργία έργου</span>
    </li>
    <li class="{% if step > 4 %}done{% endif %}{% if step == 4 %}current{% endif %}">
        <span class="workflow-step-num">4</span>
        <span class="workflow-step-label">Διαχείριση έργου</span>
    </li>
</ol>
