{% extends "base.html" %}

{% block title %}Σύνδεση — Vibe Electrician{% endblock %}

{% block content %}
<div class="login-card">
    <h1>⚡ Vibe Electrician</h1>
    <p class="subtitle">Διαχείριση έργων & οικονομικών</p>

    {% if form.errors %}
        <div class="alert alert-error">Λάθος όνομα χρήστη ή κωδικός.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Όνομα χρήστη</label>
            <input type="text" name="username" id="id_username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Κωδικός</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Σύνδεση</button>
    </form>
</div>
{% endblock %}
